name: Sync to Hugging Face
on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          
          # 1. Create a fresh temporary deployment directory
          mkdir ../deploy_temp
          cp -rp . ../deploy_temp/
          cd ../deploy_temp
          
          # 2. Wipe everything that could cause rejection
          rm -rf .git
          rm -rf uploads
          rm -rf .next
          rm -rf node_modules
          
          # 3. Build a brand new history with only 1 commit
          git init -b main
          git add .
          git commit -m "Deploy to Hugging Face (Full Purge)"
          
          # 4. Force push this fresh slate
          git push --force https://ilyvs:$HF_TOKEN@huggingface.co/spaces/ilyvs/animy main
