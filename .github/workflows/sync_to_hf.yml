name: Sync to Hugging Face
on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          
          # 1. Start by aggressively cleaning the current runner directory
          git clean -fdx
          rm -rf uploads || true
          
          # 2. Create the temp directory and copy ONLY the whitelist
          mkdir ../deploy_temp
          cp -rv src package.json package-lock.json prisma Dockerfile .dockerignore README.md ../deploy_temp/
          
          cd ../deploy_temp
          
          # 🔍 DEBUG: List EVERYTHING to prove these images are GONE
          echo "Listing all files in deployment directory:"
          find . -maxdepth 3
          
          # 3. Build a brand-new repository
          git init -b main
          git add .
          git commit -m "Deploy to Hugging Face (V4 Clean Whitelist)"
          
          # 4. Force-push this clean slate to Hugging Face
          git push --force https://ilyvs:$HF_TOKEN@huggingface.co/spaces/ilyvs/animy-backend main
