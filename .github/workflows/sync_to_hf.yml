name: Sync to Hugging Face
on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          # Create a fresh branch with no history to purge any binary files
          git checkout --orphan hf-deploy
          rm -rf uploads
          git add .
          git commit -m "Deploy to Hugging Face (Clean History)"
          # Push the clean branch to Hugging Face's main branch
          git push --force https://ilyvs:$HF_TOKEN@huggingface.co/spaces/ilyvs/animy hf-deploy:main
