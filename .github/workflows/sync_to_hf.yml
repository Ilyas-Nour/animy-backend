name: Sync to Hugging Face
on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          
          # 1. Create a fresh temporary deployment directory
          mkdir ../deploy_temp
          
          # 2. DO NOT COPY EVERYTHING. Only copy the WHITELIST of files needed for the API.
          # This is the ONLY 100% way to avoid binary files.
          cp -r src package.json package-lock.json prisma Dockerfile .dockerignore README.md ../deploy_temp/
          
          cd ../deploy_temp
          
          # 3. Build a brand new, single-commit history
          git init -b main
          git add .
          git commit -m "Deploy to Hugging Face (Whitelist Sync)"
          
          # 4. Force-push this clean slate
          git push --force https://ilyvs:$HF_TOKEN@huggingface.co/spaces/ilyvs/animy main
