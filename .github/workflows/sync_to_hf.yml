name: Sync to Hugging Face
on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          
          # 1. Create a fresh temporary deployment directory
          mkdir ../deploy_temp
          
          # 2. Use rsync to copy ONLY source code, explicitly EXCLUDING binary/heavy directories
          # This ensures problematic files are NEVER even seen by the new git repository
          rsync -av --exclude='.git' --exclude='node_modules' --exclude='uploads' --exclude='dist' --exclude='.next' ./ ../deploy_temp/
          
          cd ../deploy_temp
          
          # 3. Build a brand new, single-commit history with NO binary baggage
          git init -b main
          git add .
          git commit -m "Deploy to Hugging Face (Absolute Purge)"
          
          # 4. Force-push this clean slate to Hugging Face
          git push --force https://ilyvs:$HF_TOKEN@huggingface.co/spaces/ilyvs/animy main
